<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI 桌面</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style id="user-custom-css">/* 用户美化注入 */</style>
    <style>
        :root { --bg-image: url('https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=2070'); }
        body { margin: 0; font-family: -apple-system, sans-serif; height: 100vh; height: 100svh; overflow: hidden; background: #000; }
        
        .phone-screen { 
            width: 100%; 
            height: 100%; 
            background: var(--bg-image) no-repeat center center; 
            background-size: cover; 
            position: relative; 
            display: flex; 
            flex-direction: column;
            padding-bottom: env(safe-area-inset-bottom); /* 避开iPhone底部横条 */
        }

        .cloud-header { 
            background: rgba(255, 255, 255, 0.75); 
            backdrop-filter: blur(20px); 
            border-radius: 30px; 
            margin: 50px 20px 10px; 
            padding: 20px; 
            text-align: center; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
        }

        /* 优化后的 Dock 栏，稍微往上提一点 */
        .dock { 
            position: absolute; 
            bottom: calc(15px + env(safe-area-inset-bottom)); 
            left: 15px; 
            right: 15px; 
            height: 75px; 
            background: rgba(255, 255, 255, 0.45); 
            backdrop-filter: blur(25px); 
            border-radius: 25px; 
            display: flex; 
            justify-content: space-around; 
            align-items: center; 
            border: 1px solid rgba(255,255,255,0.3);
        }

        .chat-window { position: fixed; inset: 0; background: #ededed; z-index: 100; display: flex; flex-direction: column; padding-bottom: env(safe-area-inset-bottom); }
        
        .msg-bubble { max-width: 75%; padding: 10px 14px; border-radius: 12px; font-size: 16px; margin: 4px 0; word-break: break-all; position: relative; }
        .msg-user { background: #95ec69; align-self: flex-end; margin-right: 10px; }
        .msg-ai { background: #ffffff; align-self: flex-start; margin-left: 10px; }

        /* 弹窗高度自适应 */
        .modal-box {
            background: white;
            width: 100%;
            border-radius: 24px 24px 0 0;
            padding: 24px;
            padding-bottom: calc(30px + env(safe-area-inset-bottom));
            max-height: 85vh;
            overflow-y: auto;
        }
    </style>
</head>
<body>
<div id="app" class="phone-screen">
    <div class="cloud-header" id="header-section">
        <div class="text-3xl font-semibold text-gray-800">{{ currentTime }}</div>
        <div class="text-xs text-gray-500 mt-1">{{ currentDate }}</div>
        <div class="mt-2 text-xs font-medium text-gray-700 bg-white/50 inline-block px-3 py-1 rounded-full">{{ config.city }} · {{ config.weather }}</div>
    </div>

    <div class="p-6 grid grid-cols-4 gap-4">
        <div @click="chatVisible = true" class="flex flex-col items-center">
            <div class="w-14 h-14 bg-[#07c160] rounded-2xl flex items-center justify-center shadow-lg active:scale-90 transition-transform">
                <svg class="w-8 h-8 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
            </div>
            <span class="text-white text-[10px] mt-1 font-medium shadow-sm">私聊</span>
        </div>
    </div>

    <div class="dock">
        <div @click="activeModal = 'config'" class="flex flex-col items-center"><span class="text-xl">⚙️</span><span class="text-[10px] mt-1">设置</span></div>
        <div @click="activeModal = 'beauty'" class="flex flex-col items-center"><span class="text-xl">✨</span><span class="text-[10px] mt-1">美化</span></div>
        <div @click="activeModal = 'preset'" class="flex flex-col items-center"><span class="text-xl">✍️</span><span class="text-[10px] mt-1">预设</span></div>
    </div>

    <div v-if="chatVisible" class="chat-window">
        <div class="h-16 bg-gray-100 flex items-end justify-between px-4 pb-3 border-b border-gray-200">
            <button @click="chatVisible = false" class="text-gray-600 text-sm">返回</button>
            <span class="font-bold">智友</span>
            <div class="w-10"></div>
        </div>
        <div class="flex-1 overflow-y-auto p-4 flex flex-col gap-2" id="msg-box">
            <div v-for="m in messages" :class="['msg-bubble', m.role==='user'?'msg-user':'msg-ai']">{{m.content}}</div>
            <div v-if="isTyping" class="text-xs text-gray-400 ml-4">对方正在输入...</div>
        </div>
        <div class="p-3 bg-white border-t flex gap-2 items-center">
            <input v-model="userInput" @keyup.enter="sendMsg" placeholder="发个消息吧..." class="flex-1 bg-gray-100 p-2 rounded-lg text-sm outline-none">
            <button @click="sendMsg" class="bg-[#07c160] text-white px-4 py-2 rounded-lg text-sm font-medium">生成</button>
        </div>
    </div>

    <div v-if="activeModal" class="fixed inset-0 bg-black/60 z-[200] flex items-end" @click.self="activeModal = null">
        <div class="modal-box animate-slide-up">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-bold text-lg text-gray-800">{{modalTitle}}</h3>
                <button @click="activeModal = null" class="bg-gray-100 w-8 h-8 rounded-full flex items-center justify-center text-gray-500">✕</button>
            </div>
            
            <div v-if="activeModal==='config'" class="space-y-4">
                <div class="space-y-1">
                    <label class="text-[10px] text-gray-400 ml-1">API BASE URL</label>
                    <input v-model="config.baseUrl" placeholder="https://api.openai.com/v1" class="w-full p-3 bg-gray-50 rounded-xl border border-gray-100 text-sm">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] text-gray-400 ml-1">API KEY</label>
                    <input v-model="config.apiKey" type="password" placeholder="sk-..." class="w-full p-3 bg-gray-50 rounded-xl border border-gray-100 text-sm">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] text-gray-400 ml-1">MODEL NAME</label>
                    <input v-model="config.model" placeholder="gpt-4o" class="w-full p-3 bg-gray-50 rounded-xl border border-gray-100 text-sm">
                </div>
                <div class="flex gap-3">
                    <div class="flex-1 space-y-1">
                        <label class="text-[10px] text-gray-400 ml-1">CITY</label>
                        <input v-model="config.city" placeholder="上海" class="w-full p-3 bg-gray-50 rounded-xl border border-gray-100 text-sm">
                    </div>
                    <div class="flex-1 space-y-1">
                        <label class="text-[10px] text-gray-400 ml-1">WEATHER</label>
                        <input v-model="config.weather" placeholder="晴" class="w-full p-3 bg-gray-50 rounded-xl border border-gray-100 text-sm">
                    </div>
                </div>
            </div>

            <div v-else class="space-y-3">
                <p class="text-[11px] text-orange-400 bg-orange-50 p-2 rounded-lg">💡 在下方输入 CSS 代码，保存后界面会立即变化</p>
                <textarea v-model="activeModal==='beauty'?config.beautyCss:config.presetCss" rows="6" class="w-full p-3 bg-gray-50 rounded-xl font-mono text-xs border border-gray-100 focus:bg-white transition-colors" placeholder="/* 比如修改背景图：\n:root { --bg-image: url('图片网址'); } */"></textarea>
            </div>

            <button @click="save" class="w-full bg-blue-600 text-white py-4 rounded-2xl mt-8 font-bold shadow-lg shadow-blue-200 active:scale-95 transition-all">保存生效</button>
        </div>
    </div>
</div>

<script>
const { createApp, ref, onMounted, computed } = Vue;
createApp({
    setup() {
        const config = ref({ baseUrl: '', apiKey: '', model: 'gpt-4o', city: '上海', weather: '晴', beautyCss: '', presetCss: '' });
        const currentTime = ref(''); const currentDate = ref('');
        const chatVisible = ref(false); const activeModal = ref(null);
        const userInput = ref(''); const isTyping = ref(false);
        const messages = ref([{ role: 'assistant', content: '哈喽~ 找我有什么事吗？' }]);

        const modalTitle = computed(() => ({ config: '⚙️ 参数设置', beauty: '✨ 界面美化', preset: '✍️ 回复预设' }[activeModal.value]));
        
        const tick = () => {
            const d = new Date();
            currentTime.value = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
            currentDate.value = d.toLocaleDateString('zh-CN', { month: 'long', day: 'numeric', weekday: 'long' });
        };

        const save = () => { 
            localStorage.setItem('ai_config_v2', JSON.stringify(config.value)); 
            document.getElementById('user-custom-css').innerHTML = config.value.beautyCss + config.value.presetCss;
            activeModal.value = null; 
        };

        const sendMsg = async () => {
            if (!userInput.value || isTyping.value) return;
            const text = userInput.value;
            messages.value.push({ role: 'user', content: text });
            userInput.value = ''; isTyping.value = true;
            
            setTimeout(() => { const b = document.getElementById('msg-box'); b.scrollTop = b.scrollHeight; }, 50);

            try {
                const sys = `你是我最真实的人类好友。
                当前地点：${config.value.city}，天气：${config.value.weather}，时间：${currentTime.value}。
                回复规则：
                1. 像真人一样说话，禁止AI翻译腔，字数严格控制在20字内。
                2. 禁止承认自己是AI，若被质疑请开玩笑避开。
                3. 如果一句话说不完，可以用 [SEP] 分隔。`;
                
                const res = await fetch(`${config.value.baseUrl}/chat/completions`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${config.value.apiKey}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ model: config.value.model, messages: [{role:'system', content:sys}, ...messages.value.slice(-5)] })
                });
                const data = await res.json();
                const reply = data.choices[0].message.content;
                const parts = reply.split('[SEP]');
                for (let p of parts) {
                    if (p.trim()) {
                        await new Promise(r => setTimeout(r, 700));
                        messages.value.push({ role: 'assistant', content: p.trim() });
                        setTimeout(() => { const b = document.getElementById('msg-box'); b.scrollTop = b.scrollHeight; }, 50);
                    }
                }
            } catch (e) { 
                messages.value.push({ role: 'assistant', content: '哎呀，网络好像断了，检查下设置？' }); 
            } finally { isTyping.value = false; }
        };

        onMounted(() => {
            const s = localStorage.getItem('ai_config_v2'); 
            if (s) config.value = JSON.parse(s);
            tick(); setInterval(tick, 1000); save();
        });

        return { config, currentTime, currentDate, chatVisible, activeModal, modalTitle, userInput, messages, isTyping, save, sendMsg };
    }
}).mount('#app');
</script>

<style>
@keyframes slide-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
.animate-slide-up { animation: slide-up 0.3s ease-out; }
</style>
</body>
</html>
