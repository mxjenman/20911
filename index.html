<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>微信助手</title>
    
    <link rel="apple-touch-icon" href="https://test.fukit.cn/autoupload/fr/PUOzIkT_hEAqz4elPzgm9kg93R44cerOKVobYyu6bmqyl5f0KlZfm6UsKj-HyTuv/20260224/IR8x/1206X1168/IMG_2714.jpeg">
    <link rel="icon" type="image/jpeg" href="https://test.fukit.cn/autoupload/fr/PUOzIkT_hEAqz4elPzgm9kg93R44cerOKVobYyu6bmqyl5f0KlZfm6UsKj-HyTuv/20260224/IR8x/1206X1168/IMG_2714.jpeg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; font-family: -apple-system, sans-serif; background: #ededed; height: 100vh; overflow: hidden; }
        #app { height: 100%; display: flex; flex-direction: column; }
        
        /* 顶部标题栏 */
        .nav-header { height: 44px; background: #ededed; display: flex; align-items: center; justify-content: center; font-weight: 600; border-bottom: 0.5px solid #ddd; flex-shrink: 0; }
        
        /* 内容区域 */
        .main-content { flex: 1; overflow-y: auto; padding-bottom: 20px; }
        
        /* 底部导航栏 */
        .tab-bar { 
            height: 56px; background: #f7f7f7; border-top: 0.5px solid #ccc; 
            display: flex; justify-content: space-around; align-items: center;
            padding-bottom: env(safe-area-inset-bottom); flex-shrink: 0;
        }
        .tab-item { display: flex; flex-direction: column; align-items: center; color: #1a1a1a; font-size: 10px; }
        .tab-item.active { color: #07c160; }
        .tab-icon { width: 24px; height: 24px; margin-bottom: 2px; }

        /* 微信列表样式 */
        .cell { background: white; display: flex; align-items: center; padding: 12px 16px; border-bottom: 0.5px solid #eee; }
        .cell:active { background: #f2f2f2; }
        .cell-img { width: 48px; height: 48px; border-radius: 6px; margin-right: 12px; }
        
        /* 朋友圈封面 */
        .moments-header { height: 300px; background: #333; position: relative; margin-bottom: 40px; }
        .moments-bg { width: 100%; height: 100%; object-fit: cover; }
        .moments-user { position: absolute; right: 12px; bottom: -20px; display: flex; align-items: center; color: white; }
        .moments-avatar { width: 64px; height: 64px; border-radius: 8px; border: 2px solid white; margin-left: 12px; }

        /* 聊天窗口全屏 */
        .chat-view { position: fixed; inset: 0; background: #ededed; z-index: 100; display: flex; flex-direction: column; }
        .msg-bubble { max-width: 70%; padding: 10px; border-radius: 6px; font-size: 15px; margin: 8px 12px; position: relative; }
        .msg-user { background: #95ec69; align-self: flex-end; }
        .msg-ai { background: #ffffff; align-self: flex-start; }
    </style>
</head>
<body>
<div id="app">
    <template v-if="!inChat">
        <div class="nav-header">{{ titles[currentTab] }}</div>
        
        <div class="main-content">
            <div v-if="currentTab === 'wechat'">
                <div class="cell" @click="enterChat">
                    <img :src="widget.leftAvatar" class="cell-img">
                    <div class="flex-1">
                        <div class="flex justify-between"><span class="font-medium text-lg">{{widget.leftName}}</span><span class="text-xs text-gray-400">10:05</span></div>
                        <div class="text-sm text-gray-400 truncate w-64">{{messages[messages.length-1].content}}</div>
                    </div>
                </div>
            </div>

            <div v-if="currentTab === 'contacts'">
                <div class="text-[10px] px-4 py-1 text-gray-500">我的好友</div>
                <div class="cell" v-for="i in 3">
                    <img src="https://img.js.design/assets/static/7db8006d64b1509a2f66be951336a546.png" class="cell-img">
                    <span>示例好友 {{i}}</span>
                </div>
            </div>

            <div v-if="currentTab === 'discovery'">
                <div class="moments-header">
                    <img src="https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80" class="moments-bg">
                    <div class="moments-user">
                        <span class="font-bold text-shadow">我</span>
                        <img :src="widget.rightAvatar" class="moments-avatar">
                    </div>
                </div>
                <div class="bg-white p-4 mb-2">
                    <div class="flex gap-3">
                        <img :src="widget.leftAvatar" class="w-10 h-10 rounded">
                        <div class="flex-1">
                            <div class="text-blue-600 font-bold mb-1">{{widget.leftName}}</div>
                            <div class="text-black mb-2">{{widget.signature}}</div>
                            <div class="text-xs text-gray-400">1小时前</div>
                        </div>
                    </div>
                </div>
            </div>

            <div v-if="currentTab === 'me'">
                <div class="bg-white p-6 flex items-center mb-2">
                    <img :src="widget.rightAvatar" class="w-16 h-16 rounded-lg mr-4">
                    <div>
                        <div class="text-xl font-bold">{{widget.rightName}}</div>
                        <div class="text-gray-400 text-sm">微信号：ai_user_888</div>
                    </div>
                </div>
                <div class="mt-4">
                    <div class="cell bg-white mt-2"><span>支付</span></div>
                    <div class="cell bg-white mt-2"><span>收藏</span></div>
                    <div class="cell bg-white"><span>相册</span></div>
                    <div class="cell bg-white mt-2" @click="showSettings"><span>设置</span></div>
                </div>
            </div>
        </div>

        <div class="tab-bar">
            <div class="tab-item" :class="{active: currentTab==='wechat'}" @click="currentTab='wechat'">
                <div class="text-2xl">💬</div><span>微信</span>
            </div>
            <div class="tab-item" :class="{active: currentTab==='contacts'}" @click="currentTab='contacts'">
                <div class="text-2xl">👥</div><span>通讯录</span>
            </div>
            <div class="tab-item" :class="{active: currentTab==='discovery'}" @click="currentTab='discovery'">
                <div class="text-2xl">🧭</div><span>发现</span>
            </div>
            <div class="tab-item" :class="{active: currentTab==='me'}" @click="currentTab='me'">
                <div class="text-2xl">👤</div><span>我</span>
            </div>
        </div>
    </template>

    <div v-else class="chat-view">
        <div class="nav-header border-b">
            <button @click="inChat = false" class="absolute left-4 text-lg">〈</button>
            <span>{{widget.leftName}}</span>
        </div>
        <div class="flex-1 overflow-y-auto p-2 flex flex-col" id="msg-box">
            <div v-for="m in messages" :class="['msg-bubble', m.role==='user'?'msg-user':'msg-ai']">{{m.content}}</div>
        </div>
        <div class="p-2 bg-[#f7f7f7] border-t flex gap-2 pb-8">
            <input v-model="userInput" @keyup.enter="sendMsg" class="flex-1 bg-white p-2 rounded border-none outline-none">
            <button @click="sendMsg" class="bg-[#07c160] text-white px-4 py-1 rounded font-medium">发送</button>
        </div>
    </div>
</div>

<script>
const { createApp, ref, onMounted } = Vue;
createApp({
    setup() {
        const currentTab = ref('wechat');
        const inChat = ref(false);
        const titles = { wechat: '微信', contacts: '通讯录', discovery: '发现', me: '' };
        
        const widget = ref({
            leftName: '雨雨雨～', leftAvatar: 'https://img.js.design/assets/static/7db8006d64b1509a2f66be951336a546.png',
            rightName: '哦哦哦～', rightAvatar: 'https://img.js.design/assets/static/7db8006d64b1509a2f66be951336a546.png',
            signature: '我不想隔着屏幕和你说话'
        });

        const messages = ref([{ role: 'assistant', content: '哈吉米！新界面已经准备好了，去“发现”看看朋友圈吧～' }]);
        const userInput = ref('');

        const enterChat = () => { inChat.value = true; };
        
        const sendMsg = async () => {
            if (!userInput.value) return;
            messages.value.push({ role: 'user', content: userInput.value });
            const msg = userInput.value;
            userInput.value = '';
            
            // 模拟回复逻辑 (此处可接入您之前的API配置)
            setTimeout(() => {
                messages.value.push({ role: 'assistant', content: '收到啦！这是一个仿微信的功能演示。' });
            }, 500);
        };

        const showSettings = () => { alert('设置功能可以在原主屏点击⚙️进入'); };

        onMounted(() => {
            const w = localStorage.getItem('widget_v5');
            if (w) widget.value = JSON.parse(w);
        });

        return { currentTab, inChat, titles, widget, messages, userInput, enterChat, sendMsg, showSettings };
    }
}).mount('#app');
</script>
</body>
</html>
