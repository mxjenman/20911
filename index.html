<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI 桌面</title>
    <link rel="apple-touch-icon" href="https://test.fukit.cn/autoupload/fr/PUOzIkT_hEAqz4elPzgm9kg93R44cerOKVobYyu6bmqyl5f0KlZfm6UsKj-HyTuv/20260224/IR8x/1206X1168/IMG_2714.jpeg">
    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style id="user-custom-css"></style>
    <style>
        :root { --bg-image: url('https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=2070'); }
        body { margin: 0; font-family: -apple-system, sans-serif; height: 100svh; overflow: hidden; background: #000; transition: all 0.3s; }
        .phone-screen { width: 100%; height: 100%; background: var(--bg-image) no-repeat center center; background-size: cover; position: relative; display: flex; flex-direction: column; transition: background 0.5s ease; }
        
        /* 夜间模式遮罩 */
        .dark-mode .phone-screen::before { content: ''; position: absolute; inset: 0; background: rgba(0,0,0,0.4); z-index: 0; pointer-events: none; }
        
        /* 组件样式 */
        .widget-card { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(15px); border-radius: 30px; 
            margin: 29px 20px 10px; padding: 18px; z-index: 10;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border: 1px solid rgba(255,255,255,0.3);
            transition: all 0.3s;
        }
        .dark-mode .widget-card { background: rgba(28, 28, 30, 0.75); border: 1px solid rgba(255,255,255,0.1); color: white; }
        .dark-mode .name-tag { background: #3a3a3c; color: #eee; }
        .dark-mode .name-tag::after { border-top-color: #3a3a3c; }

        .avatar-wrap { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .avatar-img { width: 62px; height: 62px; border-radius: 50%; border: 2.5px solid #fff; object-fit: cover; }
        .name-tag { background: #fff; padding: 2px 14px; border-radius: 12px; font-size: 13px; font-weight: 800; margin-bottom: 8px; position: relative; color: #333; }
        .name-tag::after { content: ''; position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%); border-left: 5px solid transparent; border-right: 5px solid transparent; border-top: 5px solid #fff; }

        .dock { position: absolute; bottom: calc(10px + env(safe-area-inset-bottom)); left: 20px; right: 20px; height: 75px; background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(30px); border-radius: 30px; display: flex; justify-content: space-around; align-items: center; border: 1px solid rgba(255,255,255,0.25); z-index: 10; }
        .dark-mode .dock { background: rgba(0, 0, 0, 0.3); }

        .chat-window { position: fixed; inset: 0; background: #ededed; z-index: 100; display: flex; flex-direction: column; }
        .dark-mode .chat-window { background: #1c1c1e; color: white; }
    </style>
</head>
<body :class="{'dark-mode': isDark}">
<div id="app" class="phone-screen" :style="bgStyle">
    <input type="file" id="avatarPicker" accept="image/*" style="display: none" @change="onPhotoSelected">
    <input type="file" id="bgPicker" accept="image/*" style="display: none" @change="onBgSelected">

    <div class="widget-card">
        <div class="flex gap-6 mb-3 px-2">
            <div class="avatar-wrap" @click="handleAvatarClick('left')">
                <div class="name-tag" @click.stop="editName('left')">{{ widget.leftName }}</div>
                <img :src="widget.leftAvatar" class="avatar-img">
            </div>
            <div class="avatar-wrap" @click="handleAvatarClick('right')">
                <div class="name-tag" @click.stop="editName('right')">{{ widget.rightName }}</div>
                <img :src="widget.rightAvatar" class="avatar-img">
            </div>
        </div>
        <div class="w-full text-right pr-2" @click="editSign">
            <p class="text-[12px] font-bold tracking-tight italic" :class="isDark ? 'text-gray-400' : 'text-gray-500'">{{ widget.signature }}</p>
        </div>
    </div>

    <div class="px-10 py-6 flex gap-8">
        <div @click="chatVisible = true" class="flex flex-col items-center w-14 active:scale-90 transition-all">
            <div class="w-14 h-14 bg-gradient-to-br from-[#09d36a] to-[#07c160] rounded-2xl flex items-center justify-center shadow-lg">
                <svg class="w-8 h-8 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
            </div>
            <span class="text-white text-[10px] mt-2 font-bold shadow-sm">私聊</span>
        </div>
        <div @click="activeModal = 'appearance'" class="flex flex-col items-center w-14 active:scale-90 transition-all">
            <div class="w-14 h-14 bg-gradient-to-br from-[#ff9a9e] to-[#fecfef] rounded-2xl flex items-center justify-center shadow-lg">
                <span class="text-2xl">🎨</span>
            </div>
            <span class="text-white text-[10px] mt-2 font-bold shadow-sm">外观设置</span>
        </div>
    </div>

    <div class="dock">
        <div @click="activeModal = 'config'" class="flex flex-col items-center"><span class="text-2xl">⚙️</span><span class="text-[9px] mt-1 font-extrabold" :class="isDark?'text-white':'text-gray-800'">设置</span></div>
        <div @click="activeModal = 'beauty'" class="flex flex-col items-center"><span class="text-2xl">✨</span><span class="text-[9px] mt-1 font-extrabold" :class="isDark?'text-white':'text-gray-800'">美化</span></div>
        <div @click="activeModal = 'preset'" class="flex flex-col items-center"><span class="text-2xl">✍️</span><span class="text-[9px] mt-1 font-extrabold" :class="isDark?'text-white':'text-gray-800'">预设</span></div>
    </div>

    <div v-if="activeModal === 'appearance'" class="fixed inset-0 bg-black/40 z-[200] flex items-end" @click.self="activeModal = null">
        <div class="bg-white dark:bg-zinc-900 w-full rounded-t-[30px] p-8 pb-12 animate-slide-up">
            <div class="flex justify-between items-center mb-8"><h3 class="font-extrabold text-xl">外观与个性化</h3><button @click="activeModal = null">✕</button></div>
            <div class="space-y-6">
                <div class="flex items-center justify-between p-4 bg-gray-100 dark:bg-zinc-800 rounded-2xl" @click="isDark = !isDark">
                    <span class="font-bold">夜间模式</span>
                    <div :class="isDark ? 'bg-green-500' : 'bg-gray-300'" class="w-12 h-6 rounded-full relative transition-colors">
                        <div :class="isDark ? 'translate-x-6' : 'translate-x-1'" class="absolute top-1 w-4 h-4 bg-white rounded-full transition-transform"></div>
                    </div>
                </div>
                <div class="flex items-center justify-between p-4 bg-gray-100 dark:bg-zinc-800 rounded-2xl" @click="triggerBgPicker">
                    <span class="font-bold">更换桌面壁纸</span>
                    <span class="text-gray-400">去相册选一张 〉</span>
                </div>
            </div>
            <button @click="activeModal = null" class="w-full bg-black text-white py-4 rounded-2xl mt-8 font-bold">确定</button>
        </div>
    </div>

    <div v-if="chatVisible" class="chat-window">
        <div class="h-16 flex items-end justify-between px-4 pb-3 border-b" :class="isDark?'bg-zinc-900 border-zinc-800':'bg-gray-100'">
            <button @click="chatVisible = false" class="text-blue-600 text-sm font-bold">返回</button>
            <span class="font-bold">智友</span><div class="w-10"></div>
        </div>
        <div class="flex-1 overflow-y-auto p-4 flex flex-col gap-2">
            <div v-for="m in messages" :class="['msg-bubble', m.role==='user'?'msg-user':'msg-ai']">{{m.content}}</div>
        </div>
        <div class="p-3 bg-white dark:bg-zinc-900 border-t flex gap-2 pb-10">
            <input v-model="userInput" @keyup.enter="sendMsg" placeholder="发消息..." class="flex-1 bg-gray-100 dark:bg-zinc-800 p-2.5 rounded-xl text-sm outline-none">
            <button @click="sendMsg" class="bg-[#07c160] text-white px-5 rounded-xl text-sm font-bold">发送</button>
        </div>
    </div>
    
    <div v-if="['config','beauty','preset'].includes(activeModal)" class="fixed inset-0 bg-black/40 z-[200] flex items-end" @click.self="activeModal = null">
        <div class="bg-white dark:bg-zinc-900 w-full rounded-t-[30px] p-6 pb-12">
            <div class="flex justify-between items-center mb-6"><h3 class="font-extrabold">{{modalTitle}}</h3><button @click="activeModal = null">✕</button></div>
            <textarea v-model="config.beautyCss" v-if="activeModal!=='config'" rows="6" class="w-full p-4 bg-gray-50 dark:bg-zinc-800 rounded-2xl border-none font-mono text-xs"></textarea>
            <button @click="save" class="w-full bg-black text-white py-4 rounded-2xl mt-6 font-bold shadow-lg">保存并应用</button>
        </div>
    </div>
</div>

<script>
const { createApp, ref, onMounted, watch } = Vue;
createApp({
    setup() {
        const config = ref({ baseUrl: '', apiKey: '', model: 'gpt-4o', beautyCss: '' });
        const widget = ref({ leftName: '雅', leftAvatar: 'https://img.js.design/assets/static/7db8006d64b1509a2f66be951336a546.png', rightName: '萌', rightAvatar: 'https://img.js.design/assets/static/7db8006d64b1509a2f66be951336a546.png', signature: '卖萌偶尔失手 =￣ω￣=' });
        const isDark = ref(false);
        const customBg = ref('');
        const chatVisible = ref(false); 
        const activeModal = ref(null);
        const userInput = ref('');
        const messages = ref([{ role: 'assistant', content: '外观设置已上线！点击调色盘图标试试夜间模式吧～' }]);

        const bgStyle = Vue.computed(() => customBg.value ? { '--bg-image': `url(${customBg.value})` } : {});

        const triggerBgPicker = () => document.getElementById('bgPicker').click();
        const onBgSelected = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (event) => {
                customBg.value = event.target.result;
                localStorage.setItem('phone_bg', customBg.value);
            };
            reader.readAsDataURL(file);
        };

        const handleAvatarClick = (side) => { window.currentSide = side; document.getElementById('avatarPicker').click(); };
        const onPhotoSelected = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => { widget.value[window.currentSide + 'Avatar'] = ev.target.result; saveWidget(); };
            reader.readAsDataURL(e.target.files[0]);
        };

        const editName = (side) => { const n = prompt("名字：", widget.value[side+'Name']); if(n) widget.value[side+'Name']=n; saveWidget(); };
        const editSign = () => { const s = prompt("签名：", widget.value.signature); if(s) widget.value.signature=s; saveWidget(); };
        const saveWidget = () => localStorage.setItem('widget_v5', JSON.stringify(widget.value));
        
        watch(isDark, (val) => localStorage.setItem('phone_dark', val));

        onMounted(() => {
            const w = localStorage.getItem('widget_v5'); if(w) widget.value = JSON.parse(w);
            const bg = localStorage.getItem('phone_bg'); if(bg) customBg.value = bg;
            const dark = localStorage.getItem('phone_dark'); if(dark) isDark.value = dark === 'true';
        });

        return { config, widget, isDark, customBg, bgStyle, chatVisible, activeModal, userInput, messages, triggerBgPicker, onBgSelected, handleAvatarClick, onPhotoSelected, editName, editSign };
    }
}).mount('#app');
</script>
</body>
</html>
