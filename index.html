<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI 桌面</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 基础全屏设置 */
        html, body, #app { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #000; 
        }
        
        .desktop { 
            width: 100%; height: 100%; 
            background: var(--bg-url, linear-gradient(to bottom, #ff9a9e, #fad0c4)) no-repeat center center; 
            background-size: cover; position: relative; 
            display: flex; flex-direction: column;
            /* 适配顶部刘海 */
            padding-top: env(safe-area-inset-top);
        }

        /* 顶部小组件 */
        .widget-card { 
            margin: 40px 20px 0; padding: 22px; border-radius: 28px;
            backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.3);
            transition: 0.3s;
        }
        .day-mode .widget-card { background: rgba(255, 255, 255, 0.8); color: #000; }
        .dark-mode .widget-card { background: rgba(40, 40, 40, 0.9); color: #fff; border-color: rgba(255,255,255,0.1); }

        .avatar-img { width: 60px; height: 60px; border-radius: 50%; border: 2px solid #fff; object-fit: cover; }

        /* 【核心修复】底部 Dock 栏位置 */
        .dock { 
            position: absolute; 
            /* 这里的 100px 是为了强行避开底部的黑条，如果还不够，我们可以再加 */
            bottom: calc(100px + env(safe-area-inset-bottom)); 
            left: 20px; right: 20px; height: 90px; 
            background: rgba(255, 255, 255, 0.25); 
            backdrop-filter: blur(30px); 
            border-radius: 35px; 
            display: flex; justify-content: space-around; align-items: center;
            border: 1px solid rgba(255,255,255,0.2);
            z-index: 100;
        }

        /* 全屏 App 页面 - 强制不透明 */
        .full-page {
            position: fixed; inset: 0; z-index: 2000;
            transform: translateY(100%); transition: transform 0.4s ease-out;
        }
        .full-page.active { transform: translateY(0); }
        .day-mode .full-page { background: #f2f2f7 !important; color: #000; }
        .dark-mode .full-page { background: #000000 !important; color: #fff; }

        .list-item { background: white; padding: 20px; margin-bottom: 1px; display: flex; justify-content: space-between; }
        .dark-mode .list-item { background: #1c1c1e; }
    </style>
</head>
<body>
<div id="app" :class="isDark ? 'dark-mode' : 'day-mode'">
    
    <div class="desktop" :style="{'--bg-url': customBg ? `url(${customBg})` : ''}">
        <div class="widget-card">
            <div class="flex gap-8 mb-4">
                <div class="flex flex-col items-center">
                    <div class="text-xs font-bold mb-1" @click="editName('left')">{{ widget.leftName }}</div>
                    <img :src="widget.leftAvatar" class="avatar-img" @click="pickAvatar('left')">
                </div>
                <div class="flex flex-col items-center">
                    <div class="text-xs font-bold mb-1" @click="editName('right')">{{ widget.rightName }}</div>
                    <img :src="widget.rightAvatar" class="avatar-img" @click="pickAvatar('right')">
                </div>
            </div>
            <p class="text-[10px] text-right italic opacity-60" @click="editSign">{{ widget.signature }}</p>
        </div>

        <div class="px-10 py-10 flex gap-8">
            <div @click="activePage = 'chat'" class="flex flex-col items-center">
                <div class="w-16 h-16 bg-green-500 rounded-2xl flex items-center justify-center text-3xl shadow-lg">💬</div>
                <span class="text-white text-xs mt-2 font-bold">私聊</span>
            </div>
            <div @click="activePage = 'appearance'" class="flex flex-col items-center">
                <div class="w-16 h-16 bg-orange-400 rounded-2xl flex items-center justify-center text-3xl shadow-lg">🎨</div>
                <span class="text-white text-xs mt-2 font-bold">外观设置</span>
            </div>
        </div>

        <div class="dock">
            <div @click="activePage = 'config'" class="flex flex-col items-center"><span class="text-2xl">⚙️</span><span class="text-[10px] mt-1 font-bold">设置</span></div>
            <div @click="activePage = 'beauty'" class="flex flex-col items-center"><span class="text-2xl">✨</span><span class="text-[10px] mt-1 font-bold">美化</span></div>
            <div @click="activePage = 'preset'" class="flex flex-col items-center"><span class="text-2xl">✍️</span><span class="text-[10px] mt-1 font-bold">预设</span></div>
        </div>
    </div>

    <div v-for="p in ['appearance', 'chat', 'config', 'beauty', 'preset']" :key="p" class="full-page" :class="{'active': activePage === p}">
        <div class="px-6 pt-16 pb-6 flex justify-between items-center border-b border-gray-100">
            <h2 class="text-2xl font-bold">{{ {appearance:'外观设置',chat:'私聊',config:'设置',beauty:'美化',preset:'预设'}[p] }}</h2>
            <button @click="activePage = null" class="text-blue-500 font-bold">完成</button>
        </div>
        <div class="p-4" v-if="p === 'appearance'">
            <div class="list-item rounded-t-xl" @click="toggleDark">
                <span>夜间模式</span>
                <span class="text-blue-500">{{ isDark ? '已开启' : '已关闭' }}</span>
            </div>
            <div class="list-item rounded-b-xl" @click="pickBg">
                <span>更换壁纸</span>
                <span class="text-gray-400">〉</span>
            </div>
        </div>
        <div class="p-8 text-center opacity-20" v-else>这里是全屏内容区</div>
    </div>

    <input type="file" id="bgInput" style="display:none" @change="onFileChange($event, 'bg')">
    <input type="file" id="avatarInput" style="display:none" @change="onFileChange($event, 'avatar')">
</div>

<script>
const { createApp, ref, onMounted } = Vue;
createApp({
    setup() {
        const activePage = ref(null);
        const isDark = ref(false);
        const customBg = ref('');
        const widget = ref({
            leftName: '雅', leftAvatar: 'https://img.js.design/assets/static/7db8006d64b1509a2f66be951336a546.png',
            rightName: '萌', rightAvatar: 'https://img.js.design/assets/static/7db8006d64b1509a2f66be951336a546.png',
            signature: '卖萌偶尔失手 嘴甜从未出错 =￣ω￣='
        });
        let curSide = 'left';

        const toggleDark = () => { isDark.value = !isDark.value; localStorage.setItem('is_dark', isDark.value); };
        const pickBg = () => document.getElementById('bgInput').click();
        const pickAvatar = (s) => { curSide = s; document.getElementById('avatarInput').click(); };
        const editName = (s) => { const n = prompt("改名", widget.value[s+'Name']); if(n) widget.value[s+'Name']=n; save(); };
        const editSign = () => { const s = prompt("改签名", widget.value.signature); if(s) widget.value.signature=s; save(); };

        const onFileChange = (e, type) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                if(type === 'bg') customBg.value = ev.target.result;
                else widget.value[curSide+'Avatar'] = ev.target.result;
                save();
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        const save = () => {
            localStorage.setItem('v8_bg', customBg.value);
            localStorage.setItem('v8_widget', JSON.stringify(widget.value));
        };

        onMounted(() => {
            isDark.value = localStorage.getItem('is_dark') === 'true';
            customBg.value = localStorage.getItem('v8_bg') || '';
            const w = localStorage.getItem('v8_widget');
            if(w) widget.value = JSON.parse(w);
        });

        return { activePage, isDark, customBg, widget, toggleDark, pickBg, pickAvatar, onFileChange, editName, editSign };
    }
}).mount('#app');
</script>
</body>
</html>
