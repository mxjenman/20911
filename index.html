<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI 桌面</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 1. 强制全屏基础逻辑 */
        html, body, #app { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #000; 
        }
        
        .desktop { 
            width: 100%; height: 100%; 
            background: var(--bg-url, linear-gradient(to bottom, #ff9a9e, #fad0c4)) no-repeat center center; 
            background-size: cover; position: relative; 
            display: flex; flex-direction: column;
            padding-top: env(safe-area-inset-top);
        }

        /* 2. 小组件样式 */
        .widget-card { 
            margin: 40px 20px 0; padding: 22px; border-radius: 28px;
            backdrop-filter: blur(20px); border: 1.5px solid rgba(255,255,255,0.3);
            transition: 0.3s;
        }
        .day-mode .widget-card { background: rgba(255, 255, 255, 0.85); color: #000; }
        .dark-mode .widget-card { background: rgba(30, 30, 32, 0.9); color: #fff; border-color: rgba(255,255,255,0.1); }

        .avatar-img { width: 64px; height: 64px; border-radius: 50%; border: 3px solid #fff; object-fit: cover; }

        /* 3. 【核心修正】Dock 栏精准挪动 */
        .dock { 
            position: absolute; 
            /* 关键修改：利用 safe-area 加一个 25px 的补偿，这刚好能跳过黑条 */
            bottom: calc(25px + env(safe-area-inset-bottom)); 
            left: 20px; right: 20px; height: 86px; 
            background: rgba(255, 255, 255, 0.3); 
            backdrop-filter: blur(30px); 
            border-radius: 38px; 
            display: flex; justify-content: space-around; align-items: center;
            border: 1px solid rgba(255,255,255,0.25);
            z-index: 100;
        }

        /* 4. App 页面强制实色（解决透明问题） */
        .full-page {
            position: fixed; inset: 0; z-index: 2000;
            transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            /* 保证背景绝不透明 */
            background-clip: padding-box;
        }
        .full-page.active { transform: translateY(0); }
        .day-mode .full-page { background: #f2f2f7 !important; color: #000; }
        .dark-mode .full-page { background: #000000 !important; color: #fff; }

        .list-item { background: white; padding: 18px 20px; margin-bottom: 1px; display: flex; justify-content: space-between; align-items: center; }
        .dark-mode .list-item { background: #1c1c1e; }
    </style>
</head>
<body>
<div id="app" :class="isDark ? 'dark-mode' : 'day-mode'">
    
    <div class="desktop" :style="{'--bg-url': customBg ? `url(${customBg})` : ''}">
        <div class="widget-card">
            <div class="flex gap-10 mb-4 px-2">
                <div class="flex flex-col items-center">
                    <div class="text-xs font-bold mb-2 px-3 py-1 bg-white/50 rounded-lg" @click="editName('left')">{{ widget.leftName }}</div>
                    <img :src="widget.leftAvatar" class="avatar-img" @click="pickAvatar('left')">
                </div>
                <div class="flex flex-col items-center">
                    <div class="text-xs font-bold mb-2 px-3 py-1 bg-white/50 rounded-lg" @click="editName('right')">{{ widget.rightName }}</div>
                    <img :src="widget.rightAvatar" class="avatar-img" @click="pickAvatar('right')">
                </div>
            </div>
            <p class="text-[11px] text-right italic font-medium pr-2 opacity-70" @click="editSign">{{ widget.signature }}</p>
        </div>

        <div class="px-10 py-12 flex gap-10">
            <div @click="activePage = 'chat'" class="flex flex-col items-center active:scale-90 transition-transform">
                <div class="w-16 h-16 bg-[#07c160] rounded-2xl flex items-center justify-center text-3xl shadow-xl">💬</div>
                <span class="text-white text-xs mt-2 font-bold drop-shadow-md">私聊</span>
            </div>
            <div @click="activePage = 'appearance'" class="flex flex-col items-center active:scale-90 transition-transform">
                <div class="w-16 h-16 bg-gradient-to-br from-pink-400 to-orange-400 rounded-2xl flex items-center justify-center text-3xl shadow-xl">🎨</div>
                <span class="text-white text-xs mt-2 font-bold drop-shadow-md">外观设置</span>
            </div>
        </div>

        <div class="dock">
            <div @click="activePage = 'config'" class="flex flex-col items-center"><span class="text-2xl">⚙️</span><span class="text-[10px] mt-1 font-extrabold opacity-60">设置</span></div>
            <div @click="activePage = 'beauty'" class="flex flex-col items-center"><span class="text-2xl">✨</span><span class="text-[10px] mt-1 font-extrabold opacity-60">美化</span></div>
            <div @click="activePage = 'preset'" class="flex flex-col items-center"><span class="text-2xl">✍️</span><span class="text-[10px] mt-1 font-extrabold opacity-60">预设</span></div>
        </div>
    </div>

    <div v-for="p in ['appearance', 'chat', 'config', 'beauty', 'preset']" :key="p" class="full-page" :class="{'active': activePage === p}">
        <div class="px-6 pt-16 pb-6 flex justify-between items-center border-b border-gray-100 dark:border-zinc-800">
            <h2 class="text-2xl font-black">{{ {appearance:'外观设置',chat:'私聊',config:'参数设置',beauty:'界面美化',preset:'人格预设'}[p] }}</h2>
            <button @click="activePage = null" class="text-blue-500 font-bold text-lg">完成</button>
        </div>
        <div class="p-4" v-if="p === 'appearance'">
            <div class="list-item rounded-t-2xl" @click="toggleDark">
                <span class="font-bold">夜间模式</span>
                <div :class="isDark ? 'bg-green-500' : 'bg-gray-300'" class="w-12 h-6 rounded-full relative transition-all">
                    <div :class="isDark ? 'translate-x-6' : 'translate-x-1'" class="absolute top-1 w-4 h-4 bg-white rounded-full transition-all"></div>
                </div>
            </div>
            <div class="list-item rounded-b-2xl" @click="pickBg">
                <span class="font-bold">更换壁纸</span>
                <span class="text-gray-400">去相册 〉</span>
            </div>
        </div>
        <div class="p-8 text-center mt-20" v-else>
            <div class="w-20 h-20 bg-gray-100 dark:bg-zinc-900 rounded-3xl mx-auto mb-4 flex items-center justify-center text-4xl opacity-50">🚧</div>
            <p class="opacity-30 font-bold">功能正在全力开发中...</p>
        </div>
    </div>

    <input type="file" id="bgInput" style="display:none" @change="onFileChange($event, 'bg')">
    <input type="file" id="avatarInput" style="display:none" @change="onFileChange($event, 'avatar')">
</div>

<script>
const { createApp, ref, onMounted } = Vue;
createApp({
    setup() {
        const activePage = ref(null);
        const isDark = ref(false);
        const customBg = ref('');
        const widget = ref({
            leftName: '雨雨雨～', leftAvatar: 'https://img.js.design/assets/static/7db8006d64b1509a2f66be951336a546.png',
            rightName: '哦哦哦～', rightAvatar: 'https://img.js.design/assets/static/7db8006d64b1509a2f66be951336a546.png',
            signature: '我不想隔着屏幕和你说话'
        });
        let curSide = 'left';

        const toggleDark = () => { isDark.value = !isDark.value; localStorage.setItem('pref_dark', isDark.value); };
        const pickBg = () => document.getElementById('bgInput').click();
        const pickAvatar = (s) => { curSide = s; document.getElementById('avatarInput').click(); };
        const editName = (s) => { const n = prompt("修改名字", widget.value[s+'Name']); if(n) widget.value[s+'Name']=n; save(); };
        const editSign = () => { const s = prompt("修改签名", widget.value.signature); if(s) widget.value.signature=s; save(); };

        const onFileChange = (e, type) => {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                if(type === 'bg') customBg.value = ev.target.result;
                else widget.value[curSide+'Avatar'] = ev.target.result;
                save();
            };
            reader.readAsDataURL(file);
        };

        const save = () => {
            localStorage.setItem('db_bg_v9', customBg.value);
            localStorage.setItem('db_widget_v9', JSON.stringify(widget.value));
        };

        onMounted(() => {
            const d = localStorage.getItem('pref_dark'); if(d) isDark.value = d === 'true';
            const b = localStorage.getItem('db_bg_v9'); if(b) customBg.value = b;
            const w = localStorage.getItem('db_widget_v9'); if(w) widget.value = JSON.parse(w);
        });

        return { activePage, isDark, customBg, widget, toggleDark, pickBg, pickAvatar, onFileChange, editName, editSign };
    }
}).mount('#app');
</script>
</body>
</html>
