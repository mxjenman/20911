<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI 桌面</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style id="user-custom-css">/* 用户美化注入 */</style>
    <style>
        :root { --bg-image: url('https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=2070'); }
        body { margin: 0; font-family: -apple-system, sans-serif; height: 100svh; overflow: hidden; background: #000; }
        .phone-screen { width: 100%; height: 100%; background: var(--bg-image) no-repeat center center; background-size: cover; position: relative; display: flex; flex-direction: column; padding-bottom: env(safe-area-inset-bottom); }

        /* 顶部组件：已精准上移 6px (从 55px 改为 49px) */
        .widget-card { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(15px); 
            border-radius: 30px; 
            margin: 49px 20px 10px; 
            padding: 18px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border: 1px solid rgba(255,255,255,0.3);
        }
        .avatar-wrap { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .avatar-img { width: 62px; height: 62px; border-radius: 50%; border: 2.5px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1); object-fit: cover; background: #eee; }
        .name-tag { background: #fff; padding: 2px 14px; border-radius: 12px; font-size: 13px; font-weight: 800; margin-bottom: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.05); position: relative; color: #333; }
        .name-tag::after { content: ''; position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%); border-left: 5px solid transparent; border-right: 5px solid transparent; border-top: 5px solid #fff; }

        .dock { position: absolute; bottom: calc(10px + env(safe-area-inset-bottom)); left: 20px; right: 20px; height: 75px; background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(30px); border-radius: 30px; display: flex; justify-content: space-around; align-items: center; border: 1px solid rgba(255,255,255,0.25); }
        .chat-window { position: fixed; inset: 0; background: #ededed; z-index: 100; display: flex; flex-direction: column; padding-bottom: env(safe-area-inset-bottom); }
        .msg-bubble { max-width: 75%; padding: 10px 14px; border-radius: 12px; font-size: 16px; margin: 4px 0; }
        .msg-user { background: #95ec69; align-self: flex-end; margin-right: 10px; }
        .msg-ai { background: #ffffff; align-self: flex-start; margin-left: 10px; }
    </style>
</head>
<body>
<div id="app" class="phone-screen">
    <input type="file" id="avatarPicker" accept="image/*" style="display: none" @change="onPhotoSelected">

    <div class="widget-card">
        <div class="flex gap-6 mb-3 px-2">
            <div class="avatar-wrap" @click="handleAvatarClick('left')">
                <div class="name-tag" @click.stop="editName('left')">{{ widget.leftName }}</div>
                <img :src="widget.leftAvatar" class="avatar-img">
            </div>
            <div class="avatar-wrap" @click="handleAvatarClick('right')">
                <div class="name-tag" @click.stop="editName('right')">{{ widget.rightName }}</div>
                <img :src="widget.rightAvatar" class="avatar-img">
            </div>
        </div>
        <div class="w-full text-right pr-2" @click="editSign">
            <p class="text-gray-500 text-[12px] font-bold tracking-tight italic">{{ widget.signature }}</p>
        </div>
    </div>

    <div class="px-10 py-6">
        <div @click="chatVisible = true" class="flex flex-col items-center w-14 active:scale-90 transition-all">
            <div class="w-14 h-14 bg-gradient-to-br from-[#09d36a] to-[#07c160] rounded-2xl flex items-center justify-center shadow-lg">
                <svg class="w-8 h-8 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
            </div>
            <span class="text-white text-[10px] mt-2 font-bold shadow-sm">私聊</span>
        </div>
    </div>

    <div class="dock">
        <div @click="activeModal = 'config'" class="flex flex-col items-center"><span class="text-2xl">⚙️</span><span class="text-[9px] mt-1 font-extrabold">设置</span></div>
        <div @click="activeModal = 'beauty'" class="flex flex-col items-center"><span class="text-2xl">✨</span><span class="text-[9px] mt-1 font-extrabold">美化</span></div>
        <div @click="activeModal = 'preset'" class="flex flex-col items-center"><span class="text-2xl">✍️</span><span class="text-[9px] mt-1 font-extrabold">预设</span></div>
    </div>

    <div v-if="chatVisible" class="chat-window">
        <div class="h-16 bg-gray-100 flex items-end justify-between px-4 pb-3 border-b border-gray-200">
            <button @click="chatVisible = false" class="text-blue-600 text-sm font-bold">返回</button>
            <span class="font-bold">智友</span><div class="w-10"></div>
        </div>
        <div class="flex-1 overflow-y-auto p-4 flex flex-col gap-2" id="msg-box">
            <div v-for="m in messages" :class="['msg-bubble', m.role==='user'?'msg-user':'msg-ai']">{{m.content}}</div>
        </div>
        <div class="p-3 bg-white border-t flex gap-2 pb-10">
            <input v-model="userInput" @keyup.enter="sendMsg" placeholder="发消息..." class="flex-1 bg-gray-100 p-2.5 rounded-xl text-sm border-none outline-none">
            <button @click="sendMsg" class="bg-[#07c160] text-white px-5 rounded-xl text-sm font-bold">发送</button>
        </div>
    </div>

    <div v-if="activeModal" class="fixed inset-0 bg-black/40 z-[200] flex items-end" @click.self="activeModal = null">
        <div class="bg-white w-full rounded-t-[30px] p-6 pb-12">
            <div class="flex justify-between items-center mb-6"><h3 class="font-extrabold">{{modalTitle}}</h3><button @click="activeModal = null">✕</button></div>
            <div v-if="activeModal==='config'" class="space-y-4">
                <input v-model="config.baseUrl" placeholder="API 地址" class="w-full p-4 bg-gray-50 rounded-2xl border-none">
                <input v-model="config.apiKey" type="password" placeholder="API Key" class="w-full p-4 bg-gray-50 rounded-2xl border-none">
                <input v-model="config.model" placeholder="模型名称" class="w-full p-4 bg-gray-50 rounded-2xl border-none">
            </div>
            <div v-else class="space-y-3">
                <textarea v-model="activeModal==='beauty'?config.beautyCss:config.presetCss" rows="6" class="w-full p-4 bg-gray-50 rounded-2xl border-none font-mono text-xs"></textarea>
            </div>
            <button @click="save" class="w-full bg-black text-white py-4 rounded-2xl mt-6 font-bold shadow-lg">保存并应用</button>
        </div>
    </div>
</div>

<script>
const { createApp, ref, onMounted, computed } = Vue;
createApp({
    setup() {
        const config = ref({ baseUrl: '', apiKey: '', model: 'gpt-4o', beautyCss: '', presetCss: '' });
        const widget = ref({
            leftName: '雅', leftAvatar: 'https://img.js.design/assets/static/7db8006d64b1509a2f66be951336a546.png',
            rightName: '萌', rightAvatar: 'https://img.js.design/assets/static/7db8006d64b1509a2f66be951336a546.png',
            signature: '卖萌偶尔失手 嘴甜从未出错 =￣ω￣='
        });
        const currentEditSide = ref('');
        const chatVisible = ref(false); const activeModal = ref(null);
        const userInput = ref(''); const messages = ref([{ role: 'assistant', content: '位置已再次微调，看看舒服了吗？' }]);

        const modalTitle = computed(() => ({ config: '参数配置', beauty: '界面美化', preset: '人格预设' }[activeModal.value]));
        const editName = (side) => {
            const newName = prompt("名字改为什么呢？", widget.value[side + 'Name']);
            if (newName) widget.value[side + 'Name'] = newName;
            saveWidget();
        };
        const handleAvatarClick = (side) => {
            currentEditSide.value = side;
            document.getElementById('avatarPicker').click();
        };
        const onPhotoSelected = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                widget.value[currentEditSide.value + 'Avatar'] = event.target.result;
                saveWidget();
            };
            reader.readAsDataURL(file);
        };
        const editSign = () => {
            const s = prompt("想换什么签名？", widget.value.signature);
            if (s) widget.value.signature = s;
            saveWidget();
        };
        const saveWidget = () => { localStorage.setItem('widget_v5', JSON.stringify(widget.value)); };
        const save = () => { 
            localStorage.setItem('ai_config_v4', JSON.stringify(config.value)); 
            document.getElementById('user-custom-css').innerHTML = config.value.beautyCss + config.value.presetCss;
            activeModal.value = null; 
        };
        const sendMsg = async () => {
            if (!userInput.value) return;
            messages.value.push({ role: 'user', content: userInput.value });
            const input = userInput.value; userInput.value = '';
            try {
                const res = await fetch(`${config.value.baseUrl}/chat/completions`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${config.value.apiKey}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ model: config.value.model, messages: [{role:'system', content:'极简好朋友'}, ...messages.value.slice(-5)] })
                });
                const data = await res.json();
                messages.value.push({ role: 'assistant', content: data.choices[0].message.content });
            } catch (e) { messages.value.push({ role: 'assistant', content: 'API未就绪哦～' }); }
        };

        onMounted(() => {
            const s = localStorage.getItem('ai_config_v4'); if (s) config.value = JSON.parse(s);
            const w = localStorage.getItem('widget_v5'); if (w) widget.value = JSON.parse(w);
            save();
        });

        return { config, widget, chatVisible, activeModal, userInput, messages, editName, handleAvatarClick, onPhotoSelected, editSign, save, sendMsg };
    }
}).mount('#app');
</script>
</body>
</html>
