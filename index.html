<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI 桌面</title>
    <link rel="apple-touch-icon" href="https://test.fukit.cn/autoupload/fr/PUOzIkT_hEAqz4elPzgm9kg93R44cerOKVobYyu6bmqyl5f0KlZfm6UsKj-HyTuv/20260224/IR8x/1206X1168/IMG_2714.jpeg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { 
            --default-bg: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
        }
        body { margin: 0; font-family: -apple-system, sans-serif; height: 100svh; overflow: hidden; background: #000; }
        
        /* 桌面主容器 */
        .phone-screen { 
            width: 100%; height: 100%; 
            background: var(--user-bg, var(--default-bg)); 
            background-size: cover; background-position: center;
            position: relative; display: flex; flex-direction: column; 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 顶部组件 - 日间模式 (白色背景, 黑字) */
        .widget-card { 
            background: rgba(255, 255, 255, 0.8); 
            backdrop-filter: blur(20px); border-radius: 32px; 
            margin: 29px 20px 10px; padding: 20px; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.4);
            color: #1d1d1f; transition: all 0.3s;
        }

        /* 顶部组件 - 夜间模式 (深灰背景, 白字) */
        .dark-mode .widget-card { 
            background: rgba(28, 28, 30, 0.7); 
            border: 1px solid rgba(255,255,255,0.1); 
            color: #ffffff; 
        }

        /* 全屏设置页面 */
        .full-page {
            position: fixed; inset: 0; z-index: 500;
            background: #f2f2f7; display: flex; flex-direction: column;
            transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .full-page.active { transform: translateY(0); }
        .dark-mode .full-page { background: #000000; color: white; }

        /* 设置页内的条目样式 */
        .settings-item {
            background: white; margin: 0 16px 1px; padding: 16px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .dark-mode .settings-item { background: #1c1c1e; border-color: #2c2c2e; }
        .settings-group { margin-top: 20px; border-radius: 12px; overflow: hidden; }

        /* 头像与气泡 */
        .avatar-img { width: 62px; height: 62px; border-radius: 50%; border: 2px solid #fff; object-fit: cover; }
        .name-tag { background: #fff; padding: 2px 12px; border-radius: 10px; font-size: 12px; font-weight: bold; margin-bottom: 6px; color: #000; }
        .dark-mode .name-tag { background: #3a3a3c; color: #fff; }

        /* Dock栏 */
        .dock { 
            position: absolute; bottom: calc(15px + env(safe-area-inset-bottom)); 
            left: 20px; right: 20px; height: 80px; 
            background: rgba(255, 255, 255, 0.3); backdrop-filter: blur(25px); 
            border-radius: 35px; display: flex; justify-content: space-around; align-items: center;
        }
    </style>
</head>
<body :class="{'dark-mode': isDark}">
<div id="app">
    <div class="phone-screen" :style="{'--user-bg': customBg ? `url(${customBg})` : ''}">
        <div class="widget-card">
            <div class="flex gap-8 mb-4">
                <div class="flex flex-col items-center">
                    <div class="name-tag">{{ widget.leftName }}</div>
                    <img :src="widget.leftAvatar" class="avatar-img">
                </div>
                <div class="flex flex-col items-center">
                    <div class="name-tag">{{ widget.rightName }}</div>
                    <img :src="widget.rightAvatar" class="avatar-img">
                </div>
            </div>
            <p class="text-[12px] italic opacity-80 text-right">{{ widget.signature }}</p>
        </div>

        <div class="px-8 py-6 flex gap-8">
            <div @click="openFullPage('chat')" class="flex flex-col items-center active:scale-90 transition-all">
                <div class="w-14 h-14 bg-[#07c160] rounded-2xl flex items-center justify-center shadow-lg text-2xl">💬</div>
                <span class="text-white text-[11px] mt-2 font-medium">私聊</span>
            </div>
            <div @click="openFullPage('appearance')" class="flex flex-col items-center active:scale-90 transition-all">
                <div class="w-14 h-14 bg-gradient-to-br from-purple-400 to-indigo-500 rounded-2xl flex items-center justify-center shadow-lg text-2xl">🎨</div>
                <span class="text-white text-[11px] mt-2 font-medium">外观设置</span>
            </div>
        </div>

        <div class="dock">
            <div @click="openFullPage('config')" class="text-2xl">⚙️</div>
            <div @click="openFullPage('beauty')" class="text-2xl">✨</div>
            <div @click="openFullPage('preset')" class="text-2xl">✍️</div>
        </div>
    </div>

    <div class="full-page" :class="{'active': activePage === 'appearance'}">
        <div class="p-6 pt-12 flex justify-between items-center">
            <h2 class="text-2xl font-bold">外观设置</h2>
            <button @click="activePage = null" class="text-blue-500 font-bold">完成</button>
        </div>
        
        <div class="settings-group">
            <div class="settings-item" @click="toggleDark">
                <span class="font-medium">夜间模式</span>
                <div :class="isDark ? 'bg-green-500' : 'bg-gray-300'" class="w-12 h-6 rounded-full relative transition-all">
                    <div :class="isDark ? 'translate-x-6' : 'translate-x-1'" class="absolute top-1 w-4 h-4 bg-white rounded-full transition-all"></div>
                </div>
            </div>
            <div class="settings-item" @click="triggerBgPicker">
                <span class="font-medium">更换壁纸</span>
                <span class="text-gray-400">选取相册照片 〉</span>
            </div>
            <div class="settings-item" @click="resetBg">
                <span class="font-medium text-red-500">还原默认壁纸</span>
            </div>
        </div>
        <p class="p-6 text-sm text-gray-500">开启夜间模式后，桌面小组件将自动切换为深色配色。</p>
    </div>

    <input type="file" id="bgPicker" accept="image/*" style="display: none" @change="onBgSelected">
</div>

<script>
const { createApp, ref, onMounted } = Vue;
createApp({
    setup() {
        const activePage = ref(null);
        const isDark = ref(false);
        const customBg = ref('');
        const widget = ref({
            leftName: '雅', leftAvatar: 'https://img.js.design/assets/static/7db8006d64b1509a2f66be951336a546.png',
            rightName: '萌', rightAvatar: 'https://img.js.design/assets/static/7db8006d64b1509a2f66be951336a546.png',
            signature: '卖萌偶尔失手 嘴甜从未出错 =￣ω￣='
        });

        const openFullPage = (page) => activePage.value = page;
        
        const toggleDark = () => {
            isDark.value = !isDark.value;
            localStorage.setItem('phone_dark', isDark.value);
        };

        const triggerBgPicker = () => document.getElementById('bgPicker').click();
        
        const onBgSelected = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                customBg.value = event.target.result;
                localStorage.setItem('phone_bg_v2', customBg.value);
            };
            reader.readAsDataURL(file);
        };

        const resetBg = () => {
            customBg.value = '';
            localStorage.removeItem('phone_bg_v2');
        };

        onMounted(() => {
            const bg = localStorage.getItem('phone_bg_v2');
            if (bg) customBg.value = bg;
            const dark = localStorage.getItem('phone_dark');
            if (dark) isDark.value = dark === 'true';
            
            // 加载组件数据
            const w = localStorage.getItem('widget_v5');
            if (w) widget.value = JSON.parse(w);
        });

        return { activePage, isDark, customBg, widget, openFullPage, toggleDark, triggerBgPicker, onBgSelected, resetBg };
    }
}).mount('#app');
</script>
</body>
</html>
