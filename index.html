<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI 桌面</title>
    <link rel="apple-touch-icon" href="https://test.fukit.cn/autoupload/fr/PUOzIkT_hEAqz4elPzgm9kg93R44cerOKVobYyu6bmqyl5f0KlZfm6UsKj-HyTuv/20260224/IR8x/1206X1168/IMG_2714.jpeg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 强制全屏基础样式 */
        html, body, #app { margin: 0; padding: 0; width: 100%; height: 100vh; height: 100svh; overflow: hidden; background: #000; }
        
        /* 桌面主页面 */
        .desktop-screen { 
            width: 100%; height: 100%; 
            background: var(--bg-url, url('https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=2070')) no-repeat center center; 
            background-size: cover; 
            position: absolute; inset: 0;
            display: flex; flex-direction: column; 
            transition: all 0.4s ease;
            padding-top: env(safe-area-inset-top);
        }

        /* 顶部组件逻辑 */
        .widget-box { 
            margin: 29px 20px 0; padding: 22px; border-radius: 32px;
            backdrop-filter: blur(25px); border: 1.5px solid rgba(255,255,255,0.3);
            box-shadow: 0 10px 40px rgba(0,0,0,0.1); transition: all 0.3s ease;
        }
        /* 日间：白底黑字 */
        .day-mode .widget-box { background: rgba(255, 255, 255, 0.85); color: #000; }
        /* 夜间：深灰底白字 */
        .dark-mode .widget-box { background: rgba(30, 30, 32, 0.8); color: #fff; border-color: rgba(255,255,255,0.1); }

        .name-label { padding: 3px 14px; border-radius: 12px; font-weight: 800; font-size: 13px; margin-bottom: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .day-mode .name-label { background: #fff; color: #000; }
        .dark-mode .name-label { background: #444; color: #fff; }

        .avatar { width: 64px; height: 64px; border-radius: 50%; border: 3px solid #fff; object-fit: cover; }

        /* 全屏子页面共用样式 */
        .sub-page {
            position: fixed; inset: 0; z-index: 1000;
            transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex; flex-direction: column; padding-bottom: env(safe-area-inset-bottom);
        }
        .sub-page.active { transform: translateY(0); }
        
        .day-mode .sub-page { background: #f2f2f7; color: #000; }
        .dark-mode .sub-page { background: #000; color: #fff; }

        /* 设置列表项 */
        .item { 
            margin: 0 16px 1px; padding: 18px; display: flex; justify-content: space-between; align-items: center; 
            background: rgba(255,255,255,0.9); transition: 0.2s;
        }
        .dark-mode .item { background: #1c1c1e; }
        .item:first-child { border-radius: 15px 15px 0 0; }
        .item:last-child { border-radius: 0 0 15px 15px; }

        .dock-bar { 
            position: absolute; bottom: calc(15px + env(safe-area-inset-bottom)); 
            left: 20px; right: 20px; height: 84px; 
            background: rgba(255, 255, 255, 0.35); backdrop-filter: blur(30px); 
            border-radius: 38px; display: flex; justify-content: space-around; align-items: center;
            border: 1px solid rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>
<div id="app" :class="isDark ? 'dark-mode' : 'day-mode'">
    <div class="desktop-screen" :style="{'--bg-url': customBg ? `url(${customBg})` : ''}">
        <div class="widget-box">
            <div class="flex gap-10 mb-5 px-2">
                <div class="flex flex-col items-center">
                    <div class="name-label">{{ widget.leftName }}</div>
                    <img :src="widget.leftAvatar" class="avatar">
                </div>
                <div class="flex flex-col items-center">
                    <div class="name-label">{{ widget.rightName }}</div>
                    <img :src="widget.rightAvatar" class="avatar">
                </div>
            </div>
            <div class="w-full text-right pr-2">
                <p class="text-[12px] font-black italic opacity-70 tracking-tight">{{ widget.signature }}</p>
            </div>
        </div>

        <div class="px-10 py-10 flex gap-10">
            <div @click="currentPage = 'chat'" class="flex flex-col items-center active:scale-90 transition-all">
                <div class="w-16 h-16 bg-[#07c160] rounded-2xl flex items-center justify-center shadow-2xl text-3xl">💬</div>
                <span class="text-white text-xs mt-2 font-bold shadow-sm">私聊</span>
            </div>
            <div @click="currentPage = 'appearance'" class="flex flex-col items-center active:scale-90 transition-all">
                <div class="w-16 h-16 bg-gradient-to-br from-pink-400 to-rose-500 rounded-2xl flex items-center justify-center shadow-2xl text-3xl">🎨</div>
                <span class="text-white text-xs mt-2 font-bold shadow-sm">外观设置</span>
            </div>
        </div>

        <div class="dock-bar">
            <div @click="currentPage = 'config'" class="text-3xl active:scale-75 transition-transform">⚙️</div>
            <div @click="currentPage = 'beauty'" class="text-3xl active:scale-75 transition-transform">✨</div>
            <div @click="currentPage = 'preset'" class="text-3xl active:scale-75 transition-transform">✍️</div>
        </div>
    </div>

    <div class="sub-page" :class="{'active': currentPage === 'appearance'}">
        <div class="px-6 py-12 flex justify-between items-center">
            <h2 class="text-3xl font-extrabold">外观设置</h2>
            <button @click="currentPage = null" class="text-blue-500 text-lg font-bold">完成</button>
        </div>
        
        <div class="mt-4">
            <div class="item" @click="toggleDark">
                <span class="text-lg font-bold">夜间模式</span>
                <div :class="isDark ? 'bg-green-500' : 'bg-gray-300'" class="w-14 h-7 rounded-full relative transition-all">
                    <div :class="isDark ? 'translate-x-7' : 'translate-x-1'" class="absolute top-1 w-5 h-5 bg-white rounded-full transition-all"></div>
                </div>
            </div>
            <div class="item" @click="pickBg">
                <span class="text-lg font-bold">更换桌面壁纸</span>
                <span class="text-gray-400">去相册 〉</span>
            </div>
        </div>
        <p class="p-6 opacity-50 text-sm font-medium">提示：开启夜间模式后，桌面小组件将自动切换为深灰色背景。</p>
    </div>

    <div class="sub-page" :class="{'active': currentPage === 'chat'}">
        <div class="h-20 flex items-end justify-between px-6 pb-4 border-b border-gray-200">
            <button @click="currentPage = null" class="text-blue-500 font-bold">返回桌面</button>
            <span class="font-bold">哈吉米宝宝</span>
            <div class="w-12"></div>
        </div>
        <div class="flex-1 flex items-center justify-center opacity-30 font-bold">暂无新消息</div>
    </div>

    <input type="file" id="bgFile" accept="image/*" style="display: none" @change="saveBg">
</div>

<script>
const { createApp, ref, onMounted } = Vue;
createApp({
    setup() {
        const currentPage = ref(null);
        const isDark = ref(false);
        const customBg = ref('');
        const widget = ref({
            leftName: '雅', leftAvatar: 'https://img.js.design/assets/static/7db8006d64b1509a2f66be951336a546.png',
            rightName: '萌', rightAvatar: 'https://img.js.design/assets/static/7db8006d64b1509a2f66be951336a546.png',
            signature: '卖萌偶尔失手 嘴甜从未出错 =￣ω￣='
        });

        const toggleDark = () => {
            isDark.value = !isDark.value;
            localStorage.setItem('dark_mode', isDark.value);
        };

        const pickBg = () => document.getElementById('bgFile').click();
        const saveBg = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                customBg.value = ev.target.result;
                localStorage.setItem('wall_paper', customBg.value);
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        onMounted(() => {
            const d = localStorage.getItem('dark_mode'); if(d) isDark.value = d === 'true';
            const b = localStorage.getItem('wall_paper'); if(b) customBg.value = b;
            const w = localStorage.getItem('widget_v5'); if(w) widget.value = JSON.parse(w);
        });

        return { currentPage, isDark, customBg, widget, toggleDark, pickBg, saveBg };
    }
}).mount('#app');
</script>
</body>
</html>
